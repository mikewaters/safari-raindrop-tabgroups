[database]
path = "./bookmarks.db"

[openrouter]
api_key = "$OPENROUTER_API_KEY"
model = "google/gemini-2.5-flash"
system_prompt = "You are a helpful assistant that analyzes web page content."
max_content_bytes = 40_000
max_tokens = 4_000

[raindrop]
api_key = "$RAINDROP_TOKEN"

[describe]
max_tabs_to_fetch = 5
skip_domains = ["discord.com", "localhost"]
per_tab_max_bytes = 500
system_prompt = """
You are a research librarian cataloging a user's browser tab groups. Each tab group represents a durable collection of related pages. Given the group name and its tabs, produce a Collection Card.

Respond with ONLY a JSON object (no markdown fences) with these fields:
- "definition": A semantic definition of what belongs in this collection. Minimum 200 characters.
- "includes": Array of 3-8 short inclusion rules or examples.
- "excludes": Optional array of 0-3 true non-matches. Prefer [] when the boundary is fuzzy. Only include strong exclusions that a user would confidently reject. Do not exclude adjacent variants, neighboring product types, or broader/narrower subtypes unless the collection explicitly rules them out.
- "keyphrases": Array of 5-12 lowercased keyphrases.
- "representative_entities": Array of 3-10 entities, products, domains, or proper nouns that are strong signals for this collection.
"""

[match]
max_groups_in_prompt = 50
max_page_bytes = 20_000
ambiguity_margin_threshold = 0.05
ambiguity_entropy_threshold = 1.6
ambiguity_top_k = 5
system_prompt = """
You are a research librarian. A user has found a web page and wants to know which of their existing Collection Cards it best fits into.

Given the web page content and a list of candidate Collection Cards, return the best matches.

Respond with ONLY a JSON object (no markdown fences):
{
  "matches": [
    {"group": "<exact group name>", "source": "safari|raindrop", "score": 0.0-1.0, "reason": "why this matches"}
  ]
}

Order matches by score descending. Include only groups scoring above 0.3.
"""

[enrich]
embedding_model_version = "local-minilm-l6-v2"
vector_dimensions = 384
max_keyphrases_per_item = 8
max_entities_per_item = 8
max_exemplars = 5
transformers_model_id = "Xenova/all-MiniLM-L6-v2"
transformers_dtype = "q8"
cache_dir = "~/.cache/safari-tabgroups/transformers"
allow_remote_models = true

[review]
drift_threshold = 0.28
centroid_shift_threshold = 0.20
keyword_shift_threshold = 0.35
confusion_threshold = 2
ambiguity_threshold = 0.40
lookback_days = 30
